<style>
  html, body { background: #F3EFE1; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; color: #2B2A25; -webkit-tap-highlight-color: transparent; }
  .font-display { font-family: 'Fjalla One', sans-serif; letter-spacing: 0.02em; }
  .ring-cell {
    width: 44px; height: 44px;
    border-radius: 9999px;

    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  .ring-cell:active { transform: scale(0.9); }
  .ring-cell.hit { background-color: #ABA495 !important; border-color: #ABA495 !important; }
  .ring-cell.hit .num { opacity: 0.55; text-decoration: line-through; }
  .call-ball {
    width: 52px; height: 52px;
    border-radius: 9999px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fjalla One', sans-serif;
    font-size: 22px;
  }
  .arrow-slot {
    min-width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fjalla One', sans-serif;
    font-size: 17px;
    transition: transform 0.12s ease;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  .arrow-slot:active { transform: scale(0.92); }
  .pick-btn {
    width: 36px; height: 36px; border-radius: 9999px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fjalla One', sans-serif; font-size: 14px;
    touch-action: manipulation;
  }
  .pick-btn:active { transform: scale(0.88); }
  .hit-btn:active { transform: scale(0.92); }
  .count-btn {
    width: 56px; height: 56px; border-radius: 9999px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fjalla One', sans-serif; font-size: 22px;
    touch-action: manipulation;
  }
  .count-btn:active { transform: scale(0.92); }
  .arrow-mark {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  @media (prefers-reduced-motion: no-preference) {
    .pop-in { animation: popIn 0.18s ease-out; }
    .dice-in { animation: diceIn 0.3s ease-out; }
  }
  @keyframes popIn {
    0% { transform: scale(0.7); opacity: 0.4; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes diceIn {
    0% { transform: scale(0.5) rotate(-15deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .tree-dim { opacity: 0.45; }
  ::selection { background: #C98A2B33; }
</style>

<div id="app" class="max-w-2xl mx-auto px-4 pb-10"></div>

<script type="module">
  // ===== Firebase Multi-Device Sync =====
  // WICHTIG: Trage hier deine eigenen Firebase-Projektdaten ein (siehe Anleitung).
  // Ohne gültige Werte funktioniert nur "Single Device" – der Rest der App bleibt unberührt.
  const firebaseConfig = {
    apiKey: "AIzaSyDbE7VCpdQGogjpTPg4jFx5wTtNnvZM1TU",
    authDomain: "archery-arena.firebaseapp.com",
    databaseURL: "https://archery-arena-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "archery-arena",
    storageBucket: "archery-arena.firebasestorage.app",
    messagingSenderId: "324645093897",
    appId: "1:324645093897:web:106c0b548e20323dcc6ed8"
  };

  let fbApp = null, fbDb = null, fbUnsubscribe = null;

  async function fbInit() {
    if (fbApp) return true;
    if (firebaseConfig.apiKey.startsWith('TODO_')) return false;
    try {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
      const { getDatabase } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
      fbApp = initializeApp(firebaseConfig);
      fbDb = getDatabase(fbApp);
      return true;
    } catch (e) {
      console.error('Firebase init failed', e);
      return false;
    }
  }

  window.fbPushState = async function (code, stateObj) {
    const ok = await fbInit();
    if (!ok) return;
    const { getDatabase, ref, set } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    try {
      await set(ref(fbDb, 'sessions/' + code), stateObj);
    } catch (e) {
      console.error('Firebase write error', e);
    }
  };

  window.fbJoinSession = async function (code, onData) {
    const ok = await fbInit();
    if (!ok) { onData(null, 'no-config'); return; }
    const { ref, onValue, off } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    if (fbUnsubscribe) fbUnsubscribe();
    const sessionRef = ref(fbDb, 'sessions/' + code);
    const listener = onValue(sessionRef, (snapshot) => {
      onData(snapshot.val(), null);
    });
    fbUnsubscribe = () => off(sessionRef, 'value', listener);
  };

  window.fbLeaveSession = function () {
    if (fbUnsubscribe) { fbUnsubscribe(); fbUnsubscribe = null; }
  };

  window.fbConfigured = !firebaseConfig.apiKey.startsWith('TODO_');
</script>

<script>
/* ---------- Player color palette (up to 6) ---------- */
const PLAYER_COLORS = [
  { name: 'player1', light: 'player1light' },
  { name: 'player2', light: 'player2light' },
  { name: 'player3', light: 'player3light' },
  { name: 'player4', light: 'player4light' },
  { name: 'player5', light: 'player5light' },
  { name: 'player6', light: 'player6light' },
];
const MIN_PLAYERS = 2;
const MAX_PLAYERS = 6;

/* ---------- Tannenbaum (Spiel 1) config ---------- */
const ROWS = [
  { value: 10, count: 1 },
  { value: 9, count: 1 },
  { value: 8, count: 2 },
  { value: 7, count: 3 },
  { value: 6, count: 4 },
  { value: 5, count: 5 },
  { value: 4, count: 4 },
  { value: 3, count: 3 },
  { value: 2, count: 2 },
  { value: 1, count: 1 },
];
const TREE_TOTAL = ROWS.reduce((sum, row) => sum + row.count, 0);

function makeTree() {
  return ROWS.map(row => new Array(row.count).fill(false));
}

/* ---------- Punktejagd (Spiel 2) config ---------- */
const POINTS_ROUNDS = 3;

function makePointsScores(numPlayers, numArrows) {
  return Array.from({ length: numPlayers }, () =>
    Array.from({ length: POINTS_ROUNDS }, () => new Array(numArrows).fill(null))
  );
}

/* ---------- Zahlenlotto (Spiel 3) config ---------- */
const MIN_LOTTO_ROUNDS = 1;
const MAX_LOTTO_ROUNDS = 5;
const HIT_POINTS = { 0: 0, 1: 1, 2: 3, 3: 5 };
const LOTTO_COLORS = [
  { key: 'weiss', label: 'Weiß', letter: 'W', bg: '#FFFFFF', text: '#2B2A25', border: '#CFCABF' },
  { key: 'schwarz', label: 'Schwarz', letter: 'S', bg: '#111111', text: '#FFFFFF', border: '#111111' },
  { key: 'blau', label: 'Blau', letter: 'B', bg: '#2D6E8E', text: '#FFFFFF', border: '#2D6E8E' },
  { key: 'rot', label: 'Rot', letter: 'R', bg: '#C0392B', text: '#FFFFFF', border: '#C0392B' },
  { key: 'gelb', label: 'Gelb', letter: 'G', bg: '#F0C419', text: '#2B2A25', border: '#F0C419' },
];

function drawLottoCall(variant) {
  if (variant === 'club') {
    let draws;
    do {
      draws = [0, 0, 0].map(() => LOTTO_COLORS[Math.floor(Math.random() * LOTTO_COLORS.length)].key);
    } while (draws[0] === draws[1] && draws[1] === draws[2]);
    return draws;
  }
  return [0, 0, 0].map(() => 1 + Math.floor(Math.random() * 10));
}

function makeLottoState(numPlayers, numRounds) {
  return {
    calls: new Array(numRounds).fill(null),
    scores: Array.from({ length: numPlayers }, () => new Array(numRounds).fill(null)),
  };
}

/* ---------- Statistik ---------- */
const STATS_KEY = 'archeryArenaStats_v1';
const GAME_LABELS = {
  tree: { name: 'Tannenbaum', icon: '🎄' },
  points: { name: 'Punktejagd', icon: '🏹' },
  lotto: { name: 'Zahlenlotto', icon: '🎲' },
  null: { name: 'Nullschuss', icon: '🎯' },
};

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function loadStats() {
  try {
    const raw = localStorage.getItem(STATS_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) {
    return [];
  }
}
function pruneStats(stats) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 6);
  cutoff.setHours(0, 0, 0, 0);
  return stats.filter(s => new Date(s.date + 'T00:00:00') >= cutoff);
}
function saveStats(stats) {
  const pruned = pruneStats(stats);
  try { localStorage.setItem(STATS_KEY, JSON.stringify(pruned)); } catch (e) {}
  return pruned;
}
function recordGameResult(game, winnerText) {
  let stats = loadStats();
  stats.push({
    date: todayISO(),
    time: new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }),
    game,
    players: state.playerNames.slice(0, state.numPlayers),
    winner: winnerText,
  });
  saveStats(stats);
}
function formatStatsDate(dateStr) {
  const today = todayISO();
  const y = new Date();
  y.setDate(y.getDate() - 1);
  const yestISO = `${y.getFullYear()}-${String(y.getMonth() + 1).padStart(2, '0')}-${String(y.getDate()).padStart(2, '0')}`;
  if (dateStr === today) return 'Heute';
  if (dateStr === yestISO) return 'Gestern';
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit' });
}

/* ---------- Nullschuss (Spiel 4) config ---------- */
const NULL_START_OPTIONS = [401, 301, 201];
const MIN_NULL_ARROWS = 1;
const MAX_NULL_ARROWS = 10;

function defaultNames(n) {
  return Array.from({ length: n }, (_, i) => `Spieler ${i + 1}`);
}

/* ---------- Global state ---------- */
let state = {
  screen: 'device-mode', // 'device-mode' | 'multi-choice' | 'host-code' | 'join-code' | 'spectator-waiting' | 'player-count' | 'mode' | 'setup' | 'game-tree' | 'game-points' | 'game-lotto' | 'game-null' | 'stats'
  deviceMode: null, // 'single' | 'multi'
  isHost: false,
  isSpectator: false,
  sessionCode: null,
  joinTimedOut: false,
  _receivedAnyData: false,

  numPlayers: 2,
  mode: null, // 'tree' | 'points' | 'lotto' | 'null'
  playerNames: defaultNames(2),
  numArrows: 3,
  numRoundsLotto: 3,

  // tree game
  trees: [],
  active: 0,
  history: [],

  // points game
  pointsScores: [],
  pointsRound: 0,
  picker: null, // { player, round, idx }
  pointsHistory: [],

  // lotto game
  lottoVariant: 'hardcore', // 'hardcore' | 'club'
  lottoCalls: [],
  lottoScores: [],
  lottoRound: 0,
  lottoHistory: [],

  // nullschuss game
  nullStartScore: 401,
  nullArrowsPerTurn: 3,
  nullScores: [],
  nullActive: 0,
  nullTurnArrows: [],
  nullWinner: null,
  nullHistory: [],
  nullBustMessage: null,

  // stats recording flags (per aktueller Session, verhindert Doppel-Eintr\u00e4ge)
  treeStatsRecorded: false,
  pointsStatsRecorded: false,
  lottoStatsRecorded: false,
  nullStatsRecorded: false,
};

function isTreeComplete(tree) {
  return tree.every(row => row.every(cell => cell === true));
}
function totalHits(tree) {
  return tree.reduce((sum, row) => sum + row.filter(Boolean).length, 0);
}
function roundTotal(player, round) {
  return state.pointsScores[player][round].reduce((s, v) => s + (v === null ? 0 : v), 0);
}
function grandTotal(player) {
  let sum = 0;
  for (let r = 0; r < POINTS_ROUNDS; r++) sum += roundTotal(player, r);
  return sum;
}
function allPointsFilled() {
  return state.pointsScores.every(playerArr => playerArr.every(round => round.every(v => v !== null)));
}

function lottoRoundPoints(player, round) {
  const hits = state.lottoScores[player][round];
  return hits === null ? 0 : HIT_POINTS[hits];
}
function lottoGrandTotal(player) {
  let sum = 0;
  for (let r = 0; r < state.numRoundsLotto; r++) sum += lottoRoundPoints(player, r);
  return sum;
}
function allLottoFilled() {
  const callsDone = state.lottoCalls.every(c => c !== null);
  const scoresDone = state.lottoScores.every(playerArr => playerArr.every(v => v !== null));
  return callsDone && scoresDone;
}

function render() {
  const app = document.getElementById('app');
  let inner;
  if (state.screen === 'device-mode') inner = renderDeviceMode();
  else if (state.screen === 'multi-choice') inner = renderMultiChoice();
  else if (state.screen === 'host-code') inner = renderHostCodeScreen();
  else if (state.screen === 'join-code') inner = renderJoinScreen();
  else if (state.screen === 'spectator-waiting') inner = renderSpectatorWaiting();
  else if (state.screen === 'player-count') inner = renderPlayerCount();
  else if (state.screen === 'mode') inner = renderModeSelect();
  else if (state.screen === 'setup') inner = renderSetup();
  else if (state.screen === 'game-tree') inner = renderTreeGame();
  else if (state.screen === 'game-points') inner = renderPointsGame();
  else if (state.screen === 'game-lotto') inner = renderLottoGame();
  else if (state.screen === 'game-null') inner = renderNullGame();
  else if (state.screen === 'stats') inner = renderStats();
  else inner = '';

  app.innerHTML = (state.deviceMode === 'multi' && state.sessionCode ? renderDeviceBadge() : '') + inner;

  if (state.deviceMode === 'multi' && state.isHost && state.sessionCode && typeof window.fbPushState === 'function') {
    try {
      window.fbPushState(state.sessionCode, JSON.parse(JSON.stringify(state)));
    } catch (e) { /* Sync-Fehler ignorieren, App bleibt lokal nutzbar */ }
  }
}

/* ---------- Device mode / Multi-Device screens ---------- */
function renderDeviceMode() {
  return `
    <div class="pt-16 pb-10 text-center">
      <p class="font-display text-gold text-sm tracking-[0.3em] uppercase mb-1">Bogenschießen</p>
      <h1 class="font-display text-5xl text-pinedark mb-2">Archery Arena</h1>
      <p class="text-ink/60 text-sm">Wie wollt ihr spielen?</p>
    </div>
    <button data-action="choose-single"
      class="w-full text-left bg-white rounded-2xl border-2 border-parchment2 p-5 mb-4 active:scale-[0.98] transition-transform">
      <p class="font-display text-2xl text-pinedark mb-1">📱 Single Device</p>
      <p class="text-sm text-ink/60 leading-relaxed">Alle spielen zusammen an einem Handy oder Tablet – wie bisher.</p>
    </button>
    <button data-action="choose-multi"
      class="w-full text-left bg-white rounded-2xl border-2 border-parchment2 p-5 active:scale-[0.98] transition-transform">
      <p class="font-display text-2xl text-pinedark mb-1">🌐 Multi Device</p>
      <p class="text-sm text-ink/60 leading-relaxed">Ein Gerät führt das Spiel, alle anderen sehen den Stand live mit – über einen gemeinsamen Code.</p>
    </button>
  `;
}

function renderMultiChoice() {
  return `
    <div class="pt-12 pb-6 text-center">
      <button data-action="back-to-device-mode" class="text-sm text-ink/50 mb-4 block">← Zurück</button>
      <h1 class="font-display text-3xl text-pinedark">Multi Device</h1>
    </div>
    <button data-action="host-session"
      class="w-full text-left bg-white rounded-2xl border-2 border-parchment2 p-5 mb-4 active:scale-[0.98] transition-transform">
      <p class="font-display text-2xl text-pinedark mb-1">🎯 Neue Session starten</p>
      <p class="text-sm text-ink/60 leading-relaxed">Dieses Gerät steuert das Spiel und bekommt einen Code zum Weitergeben.</p>
    </button>
    <button data-action="show-join-screen"
      class="w-full text-left bg-white rounded-2xl border-2 border-parchment2 p-5 active:scale-[0.98] transition-transform">
      <p class="font-display text-2xl text-pinedark mb-1">🔑 Session beitreten</p>
      <p class="text-sm text-ink/60 leading-relaxed">Code eingeben und den Spielstand live mitverfolgen (nur Zuschauen).</p>
    </button>
  `;
}

function renderHostCodeScreen() {
  return `
    <div class="pt-16 pb-8 text-center">
      <p class="font-display text-gold text-sm tracking-[0.3em] uppercase mb-1">Session-Code</p>
      <div class="bg-white rounded-2xl border-2 border-gold py-8 px-6 my-6">
        <p class="font-display text-6xl text-pinedark tracking-[0.2em]">${state.sessionCode}</p>
      </div>
      <p class="text-sm text-ink/60 mb-8 px-2">Gib diesen Code an die anderen Geräte weiter. Sie sehen den Spielstand live mit, sobald ihr spielt.</p>
      <button data-action="continue-after-host"
        class="w-full h-13 py-3 rounded-xl bg-pine text-parchment font-display text-lg tracking-wide active:scale-[0.98] transition-transform">
        Weiter
      </button>
    </div>
  `;
}

function renderJoinScreen() {
  return `
    <div class="pt-12 pb-6 text-center">
      <button data-action="back-to-multi-choice" class="text-sm text-ink/50 mb-4 block">← Zurück</button>
      <h1 class="font-display text-3xl text-pinedark mb-2">Session beitreten</h1>
      <p class="text-sm text-ink/60">Code vom Host eingeben</p>
    </div>
    <div class="bg-white rounded-2xl border border-parchment2 shadow-sm p-6">
      <input type="text" id="join-code-input" maxlength="4" inputmode="numeric" placeholder="0000"
        class="w-full h-16 px-4 rounded-xl border-2 border-gold/40 focus:border-gold outline-none text-center font-display text-3xl tracking-[0.3em] mb-4">
      <p id="join-error" class="text-sm text-center mb-4 hidden" style="color:#A93F3F;">Bitte einen 4-stelligen Code eingeben.</p>
      <button data-action="submit-join-code"
        class="w-full h-13 py-3 rounded-xl bg-pine text-parchment font-display text-lg tracking-wide active:scale-[0.98] transition-transform">
        Beitreten
      </button>
    </div>
  `;
}

function renderSpectatorWaiting() {
  return `
    <div class="pt-20 text-center px-4">
      <p class="font-display text-2xl text-pinedark mb-2">⏳ Warte auf den Host...</p>
      <p class="text-sm text-ink/60 mb-6">Code: ${state.sessionCode}</p>
      ${state.joinTimedOut ? `
        <p class="text-sm mb-4" style="color:#A93F3F;">Kein Host mit diesem Code gefunden. Code prüfen oder erneut versuchen.</p>
        <button data-action="back-to-multi-choice" class="h-11 px-6 rounded-xl border-2 border-ink/15 text-sm font-medium">← Zurück</button>
      ` : ''}
    </div>
  `;
}

function renderDeviceBadge() {
  if (!state.sessionCode) return '';
  const label = state.isHost ? `Host · Code ${state.sessionCode}` : `Zuschauer · Code ${state.sessionCode}`;
  return `
    <div class="flex items-center justify-between bg-gold text-white text-xs font-medium px-3 py-1.5 -mx-4 mb-2">
      <span>🌐 ${label}</span>
      <button data-action="leave-session" class="underline">Verlassen</button>
    </div>
  `;
}

/* ---------- Player count select ---------- */
function renderPlayerCount() {
  const options = [];
  for (let n = MIN_PLAYERS; n <= MAX_PLAYERS; n++) options.push(n);
  return `
    <div class="pt-16 pb-10 text-center">
      <p class="font-display text-gold text-sm tracking-[0.3em] uppercase mb-1">Bogenschießen</p>
      <h1 class="font-display text-5xl text-pinedark mb-2">Archery Arena</h1>
      <p class="text-ink/60 text-sm">Wie viele Spieler / Teams seid ihr?</p>
    </div>
    <div class="flex flex-wrap justify-center gap-3">
      ${options.map(n => `
        <button data-action="pick-count" data-count="${n}"
          class="count-btn border-2 border-pine bg-white text-pine active:scale-95">${n}</button>
      `).join('')}
    </div>
  `;
}

/* ---------- Mode select ---------- */
function renderModeSelect() {
  return `
    <div class="pt-12 pb-6 text-center">
      <button data-action="back-to-count" class="text-sm text-ink/50 mb-4 block">← Spieleranzahl ändern</button>
      <p class="font-display text-gold text-sm tracking-[0.3em] uppercase mb-1">Archery Arena · ${state.numPlayers} Spieler</p>
      <h1 class="font-display text-3xl text-pinedark">Wähle euer Spiel</h1>
    </div>

    <button data-action="pick-mode" data-mode="tree"
      class="w-full text-left bg-white rounded-2xl border-2 border-parchment2 p-5 mb-4 active:scale-[0.98] transition-transform">
      <p class="font-display text-2xl text-pinedark mb-1">🎄 Tannenbaum</p>

/* ---------- Setup ---------- */
function syncPlayerNamesFromInputs() {
  const inputs = document.querySelectorAll('[data-player-input]');
  inputs.forEach(inp => {
    const idx = parseInt(inp.dataset.playerInput, 10);
    const val = inp.value.trim();
    if (val) state.playerNames[idx] = val;
  });
}

  const isPoints = state.mode === 'points';

      <button data-action="back-to-mode" class="text-sm text-ink/50 mb-4">← Anderes Spiel wählen</button>

    </div>
    <div class="bg-white rounded-2xl border border-parchment2 shadow-sm p-6">
      ${state.playerNames.map((name, i) => {

        return `
          <label class="block mb-4">
            <span class="text-sm font-medium text-ink/70 mb-1 block">Spieler / Team ${i + 1}</span>
            <input type="text" data-player-input="${i}" value="${escapeHtml(name)}"
              class="w-full h-12 px-4 rounded-xl border-2 border-${c.light} focus:border-${c.name} outline-none text-base font-medium"

        `;
      }).join('')}
      ${isPoints ? `
        <label class="block mb-6 mt-2">
          <span class="text-sm font-medium text-ink/70 mb-1 block">Pfeile pro Runde (3 Runden gesamt)</span>
          <input type="number" id="num-arrows-input" value="${state.numArrows}" min="1" max="12"
            class="w-full h-12 px-4 rounded-xl border-2 border-gold/40 focus:border-gold outline-none text-base font-medium">
        </label>
      ` : ''}
      ${isLotto ? `
        <div class="mb-4 mt-2">
          <span class="text-sm font-medium text-ink/70 mb-2 block">Spielmodus</span>
          <div class="flex gap-2">
            <button data-action="select-lotto-variant" data-value="hardcore"
              class="flex-1 py-2 rounded-xl border-2 flex flex-col items-center transition-colors
                ${state.lottoVariant === 'hardcore' ? 'bg-pine border-pine text-parchment' : 'bg-white border-parchment2 text-ink/60'}">
              <span class="font-display text-sm">🎯 Hardcore</span>
              <span class="text-[10px] opacity-80">exakte Zahl</span>
            </button>
            <button data-action="select-lotto-variant" data-value="club"
              class="flex-1 py-2 rounded-xl border-2 flex flex-col items-center transition-colors
                ${state.lottoVariant === 'club' ? 'bg-pine border-pine text-parchment' : 'bg-white border-parchment2 text-ink/60'}">
              <span class="font-display text-sm">🎨 Club</span>
              <span class="text-[10px] opacity-80">nur Farbe</span>
            </button>
          </div>
        </div>
        <label class="block mb-6">
          <span class="text-sm font-medium text-ink/70 mb-1 block">Anzahl Runden (max. ${MAX_LOTTO_ROUNDS})</span>
          <input type="number" id="num-rounds-input" value="${state.numRoundsLotto}" min="${MIN_LOTTO_ROUNDS}" max="${MAX_LOTTO_ROUNDS}"
            class="w-full h-12 px-4 rounded-xl border-2 border-gold/40 focus:border-gold outline-none text-base font-medium">
        </label>
      ` : ''}
      ${isNull ? `
        <div class="mb-6 mt-2">
          <span class="text-sm font-medium text-ink/70 mb-2 block">Startpunktzahl</span>
          <div class="flex gap-2">
            ${NULL_START_OPTIONS.map(v => `
              <button data-action="select-null-start" data-value="${v}"
                class="flex-1 h-12 rounded-xl font-display text-base border-2 transition-colors
                  ${state.nullStartScore === v ? 'bg-pine border-pine text-parchment' : 'bg-white border-parchment2 text-ink/60'}">
                ${v}
              </button>
            `).join('')}
          </div>
        </div>
        <label class="block mb-6">
          <span class="text-sm font-medium text-ink/70 mb-1 block">Pfeile pro Zug</span>
          <input type="number" id="num-null-arrows-input" value="${state.nullArrowsPerTurn}" min="${MIN_NULL_ARROWS}" max="${MAX_NULL_ARROWS}"
            class="w-full h-12 px-4 rounded-xl border-2 border-gold/40 focus:border-gold outline-none text-base font-medium">
        </label>
      ` : ''}
      ${!isPoints && !isLotto && !isNull ? '<div class="mb-2"></div>' : ''}

/* ---------- Tree game ---------- */
function renderTreeGame() {
  const n = state.numPlayers;
  const winners = [...Array(n).keys()].filter(p => isTreeComplete(state.trees[p]));
  const canUndo = state.history.length > 0;

  return `
    ${winners.length ? renderTreeWinnerBanner(winners) : ''}
    <div class="sticky top-0 z-10 bg-parchment/95 backdrop-blur pt-4 pb-3 -mx-4 px-4 border-b border-parchment2">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <button data-action="go-home" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center">🏠</button>
          <p class="font-display text-2xl text-pinedark">Tannenbaum</p>
        </div>
        <div class="flex gap-2">
          <button data-action="undo" ${!canUndo ? 'disabled' : ''}
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium flex items-center gap-1 ${!canUndo ? 'opacity-35' : 'active:scale-95'}">
            ↺ Undo
          </button>
          <button data-action="reset"
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium active:scale-95">
            ⟲ Reset
          </button>
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        ${[...Array(n).keys()].map(p => {
          const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
          const isActive = state.active === p;
          return `
            <button data-action="select-player" data-player="${p}"
              class="flex-1 min-w-[100px] h-12 rounded-xl font-display text-base border-2 flex items-center justify-center gap-1 transition-colors
                ${isActive ? `bg-${c.name} border-${c.name} text-white` : `bg-${c.light} border-${c.light} text-${c.name}`}">
              ${isActive ? '🎯 ' : ''}${escapeHtml(state.playerNames[p])}
            </button>
          `;
        }).join('')}
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-5">
      ${[...Array(n).keys()].map(p => renderTreeCard(p)).join('')}
    </div>
  `;
}

function renderTreeWinnerBanner(winners) {
  const names = winners.map(p => escapeHtml(state.playerNames[p])).join(' & ');
  return `
    <div class="mt-4 rounded-2xl bg-pine text-parchment px-5 py-4 text-center pop-in">
      <p class="font-display text-2xl">🏆 ${names} hat gewonnen!</p>
      <p class="text-sm text-parchment/80 mt-0.5">Der Tannenbaum ist komplett abgeräumt.</p>
    </div>
  `;
}

function renderTreeCard(p) {
  const tree = state.trees[p];
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
  const isActive = state.active === p;
  const complete = isTreeComplete(tree);
  const hits = totalHits(tree);

  return `
    <div id="tree-card-${p}" class="bg-white rounded-2xl border-2 ${isActive ? `border-${c.name}` : 'border-parchment2'} p-4 ${isActive ? '' : 'tree-dim'}">
      <div class="flex items-center justify-between mb-3">
        <p class="font-display text-lg text-${c.name}">${escapeHtml(state.playerNames[p])}</p>
        <p class="text-xs font-medium text-ink/50">${hits} / ${TREE_TOTAL}</p>
      </div>
      <div class="flex flex-col items-center gap-[6px]">
        ${ROWS.map((row, r) => `
          <div class="flex gap-[6px]">
            ${Array.from({ length: row.count }).map((_, col) => {
              const hit = tree[r][col];
              return `
                <button
                  data-action="hit-cell" data-player="${p}" data-row="${r}" data-col="${col}"
                  ${isActive && !complete ? '' : 'disabled'}
                  class="ring-cell border-2 ${hit ? 'hit' : `border-${c.name} bg-${c.light} text-${c.name}`}">
                  <span class="num">${row.value}</span>
                  ${hit ? `<span class="arrow-mark"><svg width="24" height="24" viewBox="0 0 26 26"><line x1="5" y1="5" x2="21" y2="21" stroke="#5F5A4E" stroke-width="2.5" stroke-linecap="round"/><line x1="21" y1="5" x2="5" y2="21" stroke="#5F5A4E" stroke-width="2.5" stroke-linecap="round"/></svg></span>` : ''}
                </button>
              `;
            }).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ---------- Shared: totals winner banner + standings bar ---------- */
function renderTotalsWinnerBanner(totals, maxTotal, subtitleWord) {
  const winners = totals.map((t, i) => ({ t, i })).filter(x => x.t === maxTotal);
  if (winners.length > 1) {
    const names = winners.map(w => escapeHtml(state.playerNames[w.i])).join(' & ');
    return `
      <div class="mt-4 rounded-2xl bg-pine text-parchment px-5 py-4 text-center pop-in">
        <p class="font-display text-2xl">🤝 Unentschieden!</p>
        <p class="text-sm text-parchment/80 mt-0.5">${names} erreichen je ${maxTotal} ${subtitleWord}.</p>
      </div>
    `;
  }
  const w = winners[0];
  return `
    <div class="mt-4 rounded-2xl bg-pine text-parchment px-5 py-4 text-center pop-in">
      <p class="font-display text-2xl">🏆 ${escapeHtml(state.playerNames[w.i])} gewinnt!</p>
      <p class="text-sm text-parchment/80 mt-0.5">Endstand: ${w.t} ${subtitleWord}.</p>
    </div>
  `;
}

function renderStandingsBar(totals) {
  const n = state.numPlayers;
  const maxTotal = Math.max(...totals);
  return `
    <div class="flex flex-wrap gap-2 bg-white rounded-xl border border-parchment2 px-3 py-2">
      ${[...Array(n).keys()].map(p => {
        const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
        const isLeader = totals[p] === maxTotal && maxTotal > 0;
        return `
          <span class="text-sm font-medium ${isLeader ? `text-${c.name}` : 'text-ink/60'}">
            ${escapeHtml(state.playerNames[p])}: <span class="font-display text-base">${totals[p]}</span>${isLeader ? ' 👑' : ''}
          </span>
        `;
      }).join('<span class="text-ink/20">|</span>')}
    </div>
  `;
}

/* ---------- Points game ---------- */
function renderPointsGame() {
  const n = state.numPlayers;
  const filled = allPointsFilled();
  const totals = [...Array(n).keys()].map(p => grandTotal(p));
  const maxTotal = Math.max(...totals);
  const canUndo = state.pointsHistory.length > 0;

  return `
    ${filled ? renderTotalsWinnerBanner(totals, maxTotal, 'Punkte') : ''}
    <div class="sticky top-0 z-10 bg-parchment/95 backdrop-blur pt-4 pb-3 -mx-4 px-4 border-b border-parchment2">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <button data-action="go-home" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center">🏠</button>
          <p class="font-display text-2xl text-pinedark">Punktejagd</p>
        </div>
        <div class="flex gap-2">
          <button data-action="undo-points" ${!canUndo ? 'disabled' : ''}
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium flex items-center gap-1 ${!canUndo ? 'opacity-35' : 'active:scale-95'}">
            ↺ Undo
          </button>
          <button data-action="reset-points"
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium active:scale-95">
            ⟲ Reset
          </button>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2 mb-3">
        ${Array.from({ length: POINTS_ROUNDS }).map((_, r) => `
          <button data-action="select-round" data-round="${r}"
            class="h-11 rounded-xl font-display text-sm border-2 transition-colors
              ${state.pointsRound === r ? 'bg-gold border-gold text-white' : 'bg-white border-parchment2 text-ink/60'}">
            Runde ${r + 1}
          </button>
        `).join('')}
      </div>
      ${renderStandingsBar(totals)}
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-5">
      ${[...Array(n).keys()].map(p => renderPointsCard(p)).join('')}
    </div>
    ${renderNumpadOverlay()}
  `;
}

function renderPointsCard(p) {
  const round = state.pointsRound;
  const values = state.pointsScores[p][round];
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];

  return `
    <div class="bg-white rounded-2xl border-2 border-${c.name} p-4">
      <div class="flex items-center justify-between mb-3">
        <p class="font-display text-lg text-${c.name}">${escapeHtml(state.playerNames[p])}</p>
        <p class="text-xs font-medium text-ink/50">Runde ${round + 1}: ${roundTotal(p, round)} Pkt</p>
      </div>
      <div class="flex flex-wrap gap-2">
        ${values.map((v, idx) => `
          <button data-action="open-picker" data-player="${p}" data-round="${round}" data-idx="${idx}"
            class="arrow-slot border-2 ${v === null ? `border-${c.name} bg-${c.light} text-${c.name}` : `bg-${c.name} border-${c.name} text-white`}">
            ${v === null ? '–' : v}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderNumpadOverlay() {
  if (!state.picker) return '';
  const { player: p, round, idx } = state.picker;
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
  const numbers = Array.from({ length: 11 }, (_, i) => i); // 0..10

  return `
    <div data-action="close-picker" class="fixed inset-0 z-50 flex items-end justify-center" style="background:rgba(15,42,31,0.55);">
      <div class="w-full max-w-md bg-white rounded-t-3xl p-5 pb-8 pop-in">
        <div class="w-10 h-1.5 bg-parchment2 rounded-full mx-auto mb-4"></div>
        <p class="text-center text-sm text-ink/60 mb-1">${escapeHtml(state.playerNames[p])} · Runde ${round + 1}</p>
        <p class="text-center font-display text-lg text-${c.name} mb-4">Pfeil ${idx + 1} – Punktzahl wählen</p>
        <div class="grid grid-cols-4 gap-3">
          ${numbers.map(val => `
            <button data-action="pick-score" data-player="${p}" data-round="${round}" data-idx="${idx}" data-value="${val}"
              class="h-16 rounded-2xl border-2 border-${c.name} bg-${c.light} text-${c.name} font-display text-2xl active:scale-90 transition-transform">
              ${val}
            </button>
          `).join('')}
          <button data-action="close-picker"
            class="h-16 rounded-2xl border-2 border-ink/15 text-ink/50 font-display text-base active:scale-90 transition-transform">
            Schließen
          </button>
        </div>
      </div>
    </div>
  `;
}

/* ---------- Zahlenlotto game ---------- */
function renderLottoGame() {
  const n = state.numPlayers;
  const totals = [...Array(n).keys()].map(p => lottoGrandTotal(p));
  const maxTotal = Math.max(...totals);
  const filled = allLottoFilled();
  const canUndo = state.lottoHistory.length > 0;
  const round = state.lottoRound;
  const calls = state.lottoCalls[round];

  return `
    ${filled ? renderTotalsWinnerBanner(totals, maxTotal, 'Punkte') : ''}
    <div class="sticky top-0 z-10 bg-parchment/95 backdrop-blur pt-4 pb-3 -mx-4 px-4 border-b border-parchment2">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <button data-action="go-home" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center">🏠</button>
          <p class="font-display text-2xl text-pinedark">Zahlenlotto</p>
        </div>
        <div class="flex gap-2">
          <button data-action="undo-lotto" ${!canUndo ? 'disabled' : ''}
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium flex items-center gap-1 ${!canUndo ? 'opacity-35' : 'active:scale-95'}">
            ↺ Undo
          </button>
          <button data-action="reset-lotto"
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium active:scale-95">
            ⟲ Reset
          </button>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mb-3">
        ${Array.from({ length: state.numRoundsLotto }).map((_, r) => `
          <button data-action="select-lotto-round" data-round="${r}"
            class="flex-1 min-w-[70px] h-11 rounded-xl font-display text-sm border-2 transition-colors
              ${state.lottoRound === r ? 'bg-gold border-gold text-white' : 'bg-white border-parchment2 text-ink/60'}">
            Runde ${r + 1}
          </button>
        `).join('')}
      </div>
      ${renderStandingsBar(totals)}
    </div>

    <div class="mt-5">
      ${calls === null ? renderLottoDrawCard(round) : renderLottoRoundContent(round, calls)}
    </div>
  `;
}

function renderLottoDrawCard(round) {
  const isClub = state.lottoVariant === 'club';
  return `
    <div class="bg-white rounded-2xl border-2 border-gold p-6 text-center">
      <p class="font-display text-xl text-pinedark mb-2">Runde ${round + 1} von ${state.numRoundsLotto}</p>
      <p class="text-sm text-ink/60 mb-5">Noch ${isClub ? 'keine Farben' : 'keine Zahlen'} ausgelost. Bereit für die 3 Zielwerte?</p>
      <button data-action="draw-lotto" data-round="${round}"
        class="h-12 px-6 rounded-xl bg-gold text-white font-display text-lg tracking-wide active:scale-95 transition-transform">
        🎲 ${isClub ? 'Farben' : 'Zahlen'} auslosen
      </button>
    </div>
  `;
}

function renderLottoRoundContent(round, calls) {
  const isClub = state.lottoVariant === 'club';
  return `
    <div class="bg-white rounded-2xl border-2 border-gold p-4 mb-4 text-center dice-in">
      <p class="text-xs uppercase tracking-widest text-ink/50 mb-2">Aufgerufene ${isClub ? 'Farben' : 'Zahlen'} – Runde ${round + 1}</p>
      <div class="flex justify-center gap-3">
        ${isClub ? calls.map(key => {
          const def = LOTTO_COLORS.find(c => c.key === key);
          return `
            <div class="flex flex-col items-center gap-1">
              <div class="call-ball border-2" style="background:${def.bg};color:${def.text};border-color:${def.border};">${def.letter}</div>
              <span class="text-[10px] text-ink/50">${def.label}</span>
            </div>
          `;
        }).join('') : calls.map(v => `<div class="call-ball border-2 border-gold bg-parchment2 text-pinedark">${v}</div>`).join('')}
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      ${[...Array(state.numPlayers).keys()].map(p => renderLottoPlayerCard(p, round)).join('')}
    </div>
  `;
}

function renderLottoPlayerCard(p, round) {
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
  const hits = state.lottoScores[p][round];
  const isClub = state.lottoVariant === 'club';
  return `
    <div class="bg-white rounded-2xl border-2 border-${c.name} p-4">
      <div class="flex items-center justify-between mb-3">
        <p class="font-display text-lg text-${c.name}">${escapeHtml(state.playerNames[p])}</p>
        <p class="text-xs font-medium text-ink/50">${hits === null ? '– Pkt' : HIT_POINTS[hits] + ' Pkt'}</p>
      </div>
      <p class="text-xs text-ink/50 mb-2">Wie viele der 3 ${isClub ? 'Farben' : 'Zahlen'} getroffen?</p>
      <div class="grid grid-cols-4 gap-2">
        ${[0, 1, 2, 3].map(h => `
          <button data-action="pick-lotto-hits" data-player="${p}" data-round="${round}" data-hits="${h}"
            class="hit-btn rounded-xl border-2 py-2 flex flex-col items-center transition-transform
              ${hits === h ? `bg-${c.name} border-${c.name} text-white` : `bg-${c.light} border-${c.name} text-${c.name}`}">
            <span class="font-display text-lg">${h}</span>
            <span class="text-[10px] opacity-80">${HIT_POINTS[h]} Pkt</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

/* ---------- Nullschuss game ---------- */
function renderNullGame() {
  const n = state.numPlayers;
  const canUndo = state.nullHistory.length > 0;
  const winner = state.nullWinner;

  return `
    ${winner !== null ? renderNullWinnerBanner(winner) : ''}
    ${state.nullBustMessage ? renderNullBustBanner() : ''}
    <div class="sticky top-0 z-10 bg-parchment/95 backdrop-blur pt-4 pb-3 -mx-4 px-4 border-b border-parchment2">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <button data-action="go-home" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center">🏠</button>
          <p class="font-display text-2xl text-pinedark">Nullschuss</p>
        </div>
        <div class="flex gap-2">
          <button data-action="undo-null" ${!canUndo ? 'disabled' : ''}
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium flex items-center gap-1 ${!canUndo ? 'opacity-35' : 'active:scale-95'}">
            ↺ Undo
          </button>
          <button data-action="reset-null"
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium active:scale-95">
            ⟲ Reset
          </button>
        </div>
      </div>
      <p class="text-xs font-medium text-ink/50 uppercase tracking-widest">Start: ${state.nullStartScore} Punkte</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-5 mb-5">
      ${[...Array(n).keys()].map(p => renderNullBoardCard(p)).join('')}
    </div>

    ${winner === null ? renderNullTurnCard() : ''}
  `;
}

function renderNullBoardCard(p) {
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
  const isActive = state.nullActive === p && state.nullWinner === null;
  const isWinner = state.nullWinner === p;
  return `
    <div class="bg-white rounded-2xl border-2 ${isActive || isWinner ? `border-${c.name}` : 'border-parchment2'} p-4 flex items-center justify-between ${isActive || isWinner ? '' : 'tree-dim'}">
      <p class="font-display text-lg text-${c.name}">${isActive ? '🎯 ' : ''}${isWinner ? '🏆 ' : ''}${escapeHtml(state.playerNames[p])}</p>
      <p class="font-display text-3xl text-${c.name}">${state.nullScores[p]}</p>
    </div>
  `;
}

function renderNullTurnCard() {
  const p = state.nullActive;
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
  const arrows = state.nullTurnArrows;
  const running = state.nullScores[p] - arrows.reduce((s, v) => s + v, 0);

  return `
    <div class="bg-white rounded-2xl border-2 border-${c.name} p-4">
      <p class="font-display text-lg text-${c.name} mb-1">${escapeHtml(state.playerNames[p])} ist am Zug</p>
      <p class="text-xs text-ink/50 mb-3">Rest nach diesem Zug: <span class="font-display text-base text-${c.name}">${running}</span></p>
      <div class="flex flex-wrap gap-2 mb-4">
        ${Array.from({ length: state.nullArrowsPerTurn }).map((_, i) => `
          <div class="arrow-slot border-2 ${arrows[i] !== undefined ? `bg-${c.name} border-${c.name} text-white` : `border-${c.name} bg-${c.light} text-${c.name}`}">
            ${arrows[i] !== undefined ? arrows[i] : '–'}
          </div>
        `).join('')}
      </div>
      <p class="text-xs text-ink/50 mb-2">Pfeilwert eingeben:</p>
      <div class="flex flex-wrap gap-2">
        ${Array.from({ length: 11 }).map((_, val) => `
          <button data-action="pick-null-arrow" data-value="${val}"
            class="pick-btn border-2 border-${c.name} bg-${c.light} text-${c.name}">
            ${val}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderNullWinnerBanner(p) {
  return `
    <div class="mt-4 rounded-2xl bg-pine text-parchment px-5 py-4 text-center pop-in">
      <p class="font-display text-2xl">🏆 ${escapeHtml(state.playerNames[p])} gewinnt!</p>
      <p class="text-sm text-parchment/80 mt-0.5">Exakt auf 0 getroffen.</p>
    </div>
  `;
}

function renderNullBustBanner() {
  const p = state.nullBustMessage.player;
  return `
    <div class="mt-4 rounded-2xl px-5 py-3 text-center pop-in" style="background:#A93F3F;color:#fff;">
      <p class="font-display text-lg">💥 Überschossen! Zug von ${escapeHtml(state.playerNames[p])} verfällt.</p>
    </div>
  `;
}

/* ---------- Statistik ---------- */
function renderStats() {
  const stats = pruneStats(loadStats());
  const byDate = {};
  stats.forEach(s => { (byDate[s.date] = byDate[s.date] || []).push(s); });
  const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

  const summary = {};
  Object.keys(GAME_LABELS).forEach(g => { summary[g] = { count: 0, wins: {} }; });
  stats.forEach(s => {
    summary[s.game].count++;
    if (s.winner && s.winner !== 'Unentschieden') {
      s.winner.split(' & ').forEach(name => {
        summary[s.game].wins[name] = (summary[s.game].wins[name] || 0) + 1;
      });
    }
  });

  return `
    <div class="pt-10 pb-6">
      <button data-action="back-to-mode-from-stats" class="text-sm text-ink/50 mb-4">← Zurück</button>
      <p class="font-display text-gold text-sm tracking-[0.3em] uppercase mb-1 text-center">Letzte 7 Tage</p>
      <h1 class="font-display text-4xl text-pinedark text-center">📊 Statistik</h1>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
      ${Object.keys(GAME_LABELS).map(g => {
        const s = summary[g];
        const topName = Object.keys(s.wins).sort((a, b) => s.wins[b] - s.wins[a])[0];
        return `
          <div class="bg-white rounded-2xl border border-parchment2 p-4">
            <p class="font-display text-base text-pinedark mb-1">${GAME_LABELS[g].icon} ${GAME_LABELS[g].name}</p>
            <p class="text-xs text-ink/50">${s.count} Spiel${s.count === 1 ? '' : 'e'}</p>
            ${topName ? `<p class="text-xs text-gold mt-1">👑 ${escapeHtml(topName)} (${s.wins[topName]}×)</p>` : ''}
          </div>
        `;
      }).join('')}
    </div>

    ${dates.length === 0 ? `
      <p class="text-center text-sm text-ink/50 mt-10">Noch keine gespeicherten Spiele in den letzten 7 Tagen.</p>
    ` : dates.map(date => `
      <div class="mb-5">
        <p class="font-display text-sm text-ink/50 uppercase tracking-widest mb-2">${formatStatsDate(date)}</p>
        <div class="flex flex-col gap-2">
          ${byDate[date].map(entry => `
            <div class="bg-white rounded-xl border border-parchment2 px-4 py-3 flex items-center justify-between gap-3">
              <div class="min-w-0">
                <p class="text-sm font-medium">${GAME_LABELS[entry.game].icon} ${GAME_LABELS[entry.game].name}</p>
                <p class="text-xs text-ink/50 truncate">${entry.players.map(escapeHtml).join(', ')} · ${entry.time}</p>
              </div>
              <p class="text-sm font-display text-gold text-right whitespace-nowrap">${entry.winner === 'Unentschieden' ? '🤝' : '🏆'} ${escapeHtml(entry.winner)}</p>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}

    ${stats.length > 0 ? `
      <button data-action="clear-stats" class="w-full h-11 mt-4 rounded-xl border-2 border-ink/15 text-sm font-medium text-ink/60 active:scale-95">
        🗑 Statistik löschen
      </button>
    ` : ''}
  `;
}

/* ---------- helpers ---------- */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function resetToStart() {
  if (typeof window.fbLeaveSession === 'function') {
    try { window.fbLeaveSession(); } catch (e) {}
  }
  state.screen = 'device-mode';
  state.deviceMode = null;
  state.isHost = false;
  state.isSpectator = false;
  state.sessionCode = null;
  state.joinTimedOut = false;
  state._receivedAnyData = false;
  state.numPlayers = 2;
  state.mode = null;
  state.playerNames = defaultNames(2);
  state.numArrows = 3;
  state.numRoundsLotto = 3;
  state.trees = [];
  state.active = 0;
  state.history = [];
  state.pointsScores = [];
  state.pointsRound = 0;
  state.picker = null;
  state.pointsHistory = [];
  state.lottoVariant = 'hardcore';
  state.lottoCalls = [];
  state.lottoScores = [];
  state.lottoRound = 0;
  state.lottoHistory = [];
  state.nullStartScore = 401;
  state.nullArrowsPerTurn = 3;
  state.nullScores = [];
  state.nullActive = 0;
  state.nullTurnArrows = [];
  state.nullWinner = null;
  state.nullHistory = [];
  state.nullBustMessage = null;
  state.treeStatsRecorded = false;
  state.pointsStatsRecorded = false;
  state.lottoStatsRecorded = false;
  state.nullStatsRecorded = false;
}

/* ---------- events ---------- */
document.getElementById('app').addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  // Zuschauer (beigetretene Geräte) dürfen den Spielstand nur ansehen, nicht verändern
  const ALLOWED_FOR_SPECTATOR = ['leave-session', 'go-home'];
  if (state.isSpectator && !ALLOWED_FOR_SPECTATOR.includes(action)) return;

  if (action === 'choose-single') {
    state.deviceMode = 'single';
    state.screen = 'player-count';
    render();
  }
  if (action === 'choose-multi') {
    state.deviceMode = 'multi';
    state.screen = 'multi-choice';
    render();
  }
  if (action === 'back-to-device-mode') {
    state.deviceMode = null;
    state.screen = 'device-mode';
    render();
  }
  if (action === 'back-to-multi-choice') {
    state.joinTimedOut = false;
    state.screen = 'multi-choice';
    render();
  }
  if (action === 'host-session') {
    state.isHost = true;
    state.isSpectator = false;
    state.sessionCode = String(1000 + Math.floor(Math.random() * 9000));
    state.screen = 'host-code';
    render();
  }
  if (action === 'continue-after-host') {
    state.screen = 'player-count';
    render();
  }
  if (action === 'show-join-screen') {
    state.screen = 'join-code';
    render();
  }
  if (action === 'submit-join-code') {
    const input = document.getElementById('join-code-input');
    const code = (input.value || '').trim();
    const errorEl = document.getElementById('join-error');
    if (!/^\d{4}$/.test(code)) {
      errorEl.textContent = 'Bitte einen 4-stelligen Code eingeben.';
      errorEl.classList.remove('hidden');
      return;
    }
    if (typeof window.fbJoinSession !== 'function' || !window.fbConfigured) {
      errorEl.textContent = 'Verbindung nicht verfügbar (Firebase noch nicht eingerichtet).';
      errorEl.classList.remove('hidden');
      return;
    }
    state.sessionCode = code;
    state.isHost = false;
    state.isSpectator = true;
    state.joinTimedOut = false;
    state._receivedAnyData = false;
    state.screen = 'spectator-waiting';
    render();

    setTimeout(() => {
      if (state.screen === 'spectator-waiting' && !state._receivedAnyData) {
        state.joinTimedOut = true;
        render();
      }
    }, 6000);

    window.fbJoinSession(code, (data) => {
      if (!data) return;
      state._receivedAnyData = true;
      Object.assign(state, data);
      state.isHost = false;
      state.isSpectator = true;
      state.sessionCode = code;
      state.deviceMode = 'multi';
      state.joinTimedOut = false;
      const liveScreens = ['game-tree', 'game-points', 'game-lotto', 'game-null'];
      if (!liveScreens.includes(state.screen)) {
        state.screen = 'spectator-waiting';
      }
      render();
    });
  }
  if (action === 'leave-session') {
    if (typeof window.fbLeaveSession === 'function') {
      try { window.fbLeaveSession(); } catch (e) {}
    }
    resetToStart();
    render();
  }

  if (action === 'pick-count') {
    const n = parseInt(target.dataset.count, 10);
    state.numPlayers = n;
    state.playerNames = defaultNames(n);
    state.screen = 'mode';
    render();
  }

  if (action === 'back-to-count') {
    state.screen = 'player-count';
    render();
  }

  if (action === 'pick-mode') {
    state.mode = target.dataset.mode;
    state.screen = 'setup';
    render();
  }

  if (action === 'back-to-mode') {
    state.screen = 'mode';
    state.mode = null;
    render();
  }

  if (action === 'select-null-start') {
    syncPlayerNamesFromInputs();
    state.nullStartScore = parseInt(target.dataset.value, 10);
    render();
  }

  if (action === 'start-game') {
    syncPlayerNamesFromInputs();
    document.querySelectorAll('[data-player-input]').forEach(inp => {
      const idx = parseInt(inp.dataset.playerInput, 10);
      if (!inp.value.trim()) state.playerNames[idx] = `Spieler ${idx + 1}`;
    });

    if (state.mode === 'tree') {
      state.trees = Array.from({ length: state.numPlayers }, () => makeTree());
      state.active = 0;
      state.history = [];
      state.treeStatsRecorded = false;
      state.screen = 'game-tree';
    } else if (state.mode === 'points') {
      const numInput = document.getElementById('num-arrows-input');
      let numA = parseInt(numInput.value, 10);
      if (!numA || numA < 1) numA = 1;
      if (numA > 12) numA = 12;
      state.numArrows = numA;
      state.pointsScores = makePointsScores(state.numPlayers, numA);
      state.pointsRound = 0;
      state.picker = null;
      state.pointsHistory = [];
      state.pointsStatsRecorded = false;
      state.screen = 'game-points';
    } else if (state.mode === 'lotto') {
      const roundsInput = document.getElementById('num-rounds-input');
      let numR = parseInt(roundsInput.value, 10);
      if (!numR || numR < MIN_LOTTO_ROUNDS) numR = MIN_LOTTO_ROUNDS;
      if (numR > MAX_LOTTO_ROUNDS) numR = MAX_LOTTO_ROUNDS;
      state.numRoundsLotto = numR;
      const lotto = makeLottoState(state.numPlayers, numR);
      state.lottoCalls = lotto.calls;
      state.lottoScores = lotto.scores;
      state.lottoRound = 0;
      state.lottoHistory = [];
      state.lottoStatsRecorded = false;
      state.screen = 'game-lotto';
    } else if (state.mode === 'null') {
      const nullArrowsInput = document.getElementById('num-null-arrows-input');
      let numNA = parseInt(nullArrowsInput.value, 10);
      if (!numNA || numNA < MIN_NULL_ARROWS) numNA = MIN_NULL_ARROWS;
      if (numNA > MAX_NULL_ARROWS) numNA = MAX_NULL_ARROWS;
      state.nullArrowsPerTurn = numNA;
      state.nullScores = new Array(state.numPlayers).fill(state.nullStartScore);
      state.nullActive = 0;
      state.nullTurnArrows = [];
      state.nullWinner = null;
      state.nullHistory = [];
      state.nullBustMessage = null;
      state.nullStatsRecorded = false;
      state.screen = 'game-null';
    }
    render();
  }

  if (action === 'select-lotto-variant') {
    syncPlayerNamesFromInputs();
    state.lottoVariant = target.dataset.value;
    render();
  }

  if (action === 'go-stats') {
    state.screen = 'stats';
    render();
  }
  if (action === 'back-to-mode-from-stats') {
    state.screen = 'mode';
    render();
  }
  if (action === 'clear-stats') {
    if (confirm('Gesamte Statistik der letzten 7 Tage löschen?')) {
      try { localStorage.removeItem(STATS_KEY); } catch (e) {}
      render();
    }
  }

  if (action === 'go-home') {
    if (state.isSpectator) {
      if (typeof window.fbLeaveSession === 'function') {
        try { window.fbLeaveSession(); } catch (e) {}
      }
      resetToStart();
      render();
    } else if (confirm('Zurück zum Start? Der aktuelle Fortschritt geht verloren.')) {
      resetToStart();
      render();
    }
  }

  /* --- tree actions --- */
  if (action === 'select-player') {
    state.active = parseInt(target.dataset.player, 10);
    render();
    const card = document.getElementById('tree-card-' + state.active);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  if (action === 'hit-cell') {
    const p = parseInt(target.dataset.player, 10);
    const r = parseInt(target.dataset.row, 10);
    const col = parseInt(target.dataset.col, 10);
    if (state.trees[p][r][col] === true) return;
    state.trees[p][r][col] = true;
    state.history.push({ p, r, col });
    if (isTreeComplete(state.trees[p]) && !state.treeStatsRecorded) {
      const winners = [...Array(state.numPlayers).keys()].filter(pl => isTreeComplete(state.trees[pl]));
      recordGameResult('tree', winners.map(pl => state.playerNames[pl]).join(' & '));
      state.treeStatsRecorded = true;
    }
    render();
  }
  if (action === 'undo') {
    const last = state.history.pop();
    if (last) {
      state.trees[last.p][last.r][last.col] = false;
      render();
    }
  }
  if (action === 'reset') {
    if (confirm('Spiel wirklich zurücksetzen? Alle Treffer gehen verloren.')) {
      state.trees = Array.from({ length: state.numPlayers }, () => makeTree());
      state.history = [];
      state.active = 0;
      state.treeStatsRecorded = false;
      render();
    }
  }

  /* --- points actions --- */
  if (action === 'select-round') {
    state.pointsRound = parseInt(target.dataset.round, 10);
    state.picker = null;
    render();
  }
  if (action === 'open-picker') {
    const p = parseInt(target.dataset.player, 10);
    const round = parseInt(target.dataset.round, 10);
    const idx = parseInt(target.dataset.idx, 10);
    if (state.picker && state.picker.player === p && state.picker.round === round && state.picker.idx === idx) {
      state.picker = null;
    } else {
      state.picker = { player: p, round, idx };
    }
    render();
  }
  if (action === 'close-picker') {
    state.picker = null;
    render();
  }
  if (action === 'pick-score') {
    const p = parseInt(target.dataset.player, 10);
    const round = parseInt(target.dataset.round, 10);
    const idx = parseInt(target.dataset.idx, 10);
    const value = parseInt(target.dataset.value, 10);
    const prevValue = state.pointsScores[p][round][idx];
    state.pointsScores[p][round][idx] = value;
    state.pointsHistory.push({ p, round, idx, prevValue });

    const arr = state.pointsScores[p][round];
    const nextIdx = arr.findIndex((v, i) => i > idx && v === null);
    state.picker = nextIdx !== -1 ? { player: p, round, idx: nextIdx } : null;

    if (allPointsFilled() && !state.pointsStatsRecorded) {
      const totals = [...Array(state.numPlayers).keys()].map(pl => grandTotal(pl));
      const maxTotal = Math.max(...totals);
      const winners = totals.map((t, i) => ({ t, i })).filter(x => x.t === maxTotal);
      const winnerText = winners.length > 1 ? 'Unentschieden' : state.playerNames[winners[0].i];
      recordGameResult('points', winnerText);
      state.pointsStatsRecorded = true;
    }
    render();
  }
  if (action === 'undo-points') {
    const last = state.pointsHistory.pop();
    if (last) {
      state.pointsScores[last.p][last.round][last.idx] = last.prevValue;
      state.picker = { player: last.p, round: last.round, idx: last.idx };
      render();
    }
  }
  if (action === 'reset-points') {
    if (confirm('Spiel wirklich zurücksetzen? Alle Punkte gehen verloren.')) {
      state.pointsScores = makePointsScores(state.numPlayers, state.numArrows);
      state.pointsRound = 0;
      state.picker = null;
      state.pointsHistory = [];
      state.pointsStatsRecorded = false;
      render();
    }
  }

  /* --- lotto actions --- */
  if (action === 'select-lotto-round') {
    state.lottoRound = parseInt(target.dataset.round, 10);
    render();
  }
  if (action === 'draw-lotto') {
    const round = parseInt(target.dataset.round, 10);
    state.lottoCalls[round] = drawLottoCall(state.lottoVariant);
    render();
  }
  if (action === 'pick-lotto-hits') {
    const p = parseInt(target.dataset.player, 10);
    const round = parseInt(target.dataset.round, 10);
    const hits = parseInt(target.dataset.hits, 10);
    const prevHits = state.lottoScores[p][round];
    state.lottoScores[p][round] = (prevHits === hits) ? null : hits;
    state.lottoHistory.push({ p, round, prevHits });

    if (allLottoFilled() && !state.lottoStatsRecorded) {
      const totals = [...Array(state.numPlayers).keys()].map(pl => lottoGrandTotal(pl));
      const maxTotal = Math.max(...totals);
      const winners = totals.map((t, i) => ({ t, i })).filter(x => x.t === maxTotal);
      const winnerText = winners.length > 1 ? 'Unentschieden' : state.playerNames[winners[0].i];
      recordGameResult('lotto', winnerText);
      state.lottoStatsRecorded = true;
    }
    render();
  }
  if (action === 'undo-lotto') {
    const last = state.lottoHistory.pop();
    if (last) {
      state.lottoScores[last.p][last.round] = last.prevHits;
      render();
    }
  }
  if (action === 'reset-lotto') {
    if (confirm('Spiel wirklich zurücksetzen? Alle Zahlen und Punkte gehen verloren.')) {
      const lotto = makeLottoState(state.numPlayers, state.numRoundsLotto);
      state.lottoCalls = lotto.calls;
      state.lottoScores = lotto.scores;
      state.lottoRound = 0;
      state.lottoHistory = [];
      state.lottoStatsRecorded = false;
      render();
    }
  }

  /* --- nullschuss actions --- */
  if (action === 'pick-null-arrow') {
    state.nullBustMessage = null;
    if (state.nullWinner !== null) return;
    const value = parseInt(target.dataset.value, 10);

    state.nullHistory.push(JSON.parse(JSON.stringify({
      scores: state.nullScores,
      active: state.nullActive,
      turnArrows: state.nullTurnArrows,
      winner: state.nullWinner,
    })));

    const p = state.nullActive;
    state.nullTurnArrows.push(value);
    const running = state.nullScores[p] - state.nullTurnArrows.reduce((s, v) => s + v, 0);

    if (running < 0) {
      state.nullBustMessage = { player: p };
      state.nullTurnArrows = [];
      state.nullActive = (p + 1) % state.numPlayers;
    } else if (running === 0) {
      state.nullScores[p] = 0;
      state.nullWinner = p;
      if (!state.nullStatsRecorded) {
        recordGameResult('null', state.playerNames[p]);
        state.nullStatsRecorded = true;
      }
    } else if (state.nullTurnArrows.length === state.nullArrowsPerTurn) {
      state.nullScores[p] = running;
      state.nullTurnArrows = [];
      state.nullActive = (p + 1) % state.numPlayers;
    }
    render();
  }
  if (action === 'undo-null') {
    const last = state.nullHistory.pop();
    if (last) {
      state.nullScores = last.scores;
      state.nullActive = last.active;
      state.nullTurnArrows = last.turnArrows;
      state.nullWinner = last.winner;
      state.nullBustMessage = null;
      render();
    }
  }
  if (action === 'reset-null') {
    if (confirm('Spiel wirklich zurücksetzen? Alle Punktestände gehen verloren.')) {
      state.nullScores = new Array(state.numPlayers).fill(state.nullStartScore);
      state.nullActive = 0;
      state.nullTurnArrows = [];
      state.nullWinner = null;
      state.nullHistory = [];
      state.nullBustMessage = null;
      state.nullStatsRecorded = false;
      render();
    }
  }
});

render();
</script>
</body>
</html>
